# Vorlage: Überführung des bestehenden mc-fabric-Containers nach Compose
# (Fahrplan Phase 2). NICHT blind übernehmen — erst die tatsächlichen
# Parameter des laufenden Containers prüfen:
#
#   docker inspect mc-fabric   # Env, Mounts, Ports abgleichen!
#
# Vorgehen (verlustfrei):
#   1. `docker inspect mc-fabric` mit dieser Vorlage abgleichen, Werte anpassen
#   2. Spieler informieren, Welt sichern (save-all + Backup)
#   3. Alten Container stoppen und entfernen: docker stop mc-fabric && docker rm mc-fabric
#   4. Diesen Service in docker-compose.yml aufnehmen (oder als eigene Datei
#      mit `docker compose -f docker-compose.yml -f mc-fabric.compose.yml up -d`)
#   5. Altes Autostart-Skript beim Boot deaktivieren (restart-Policy übernimmt)
#
# WICHTIG (Konzept, Kapitel 13): Port 24454/udp (Simple Voice Chat) darf bei
# Neuerstellung NIE fehlen, sonst ist Voice Chat tot.

services:
  mc-fabric:
    image: itzg/minecraft-server
    container_name: mc-fabric
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: fabric
      # VERSION: "1.21.1"        # an tatsächliche Version anpassen!
      MEMORY: 12G
      ENABLE_QUERY: "true"       # für MSM-Spielerdaten
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${MSM_RCON_PASSWORD:?RCON-Passwort in .env setzen}
    ports:
      - "25565:25565"            # Minecraft
      - "24454:24454/udp"        # Simple Voice Chat — NIE weglassen!
    volumes:
      - ${MC_DATA_PATH:-~/minecraft/fabric_server}:/data
    mem_limit: 13g               # Notbremse oberhalb der 12G Heap (Konzept Kap. 8)
    stop_grace_period: 90s       # Weltspeicherung nie abwürgen
